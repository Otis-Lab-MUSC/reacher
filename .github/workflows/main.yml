name: Build and Release REACHER

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write   # Required for PyPI trusted publishing (OIDC)

env:
  PYTHON_VERSION: '3.11'

jobs:
  # -------------------------------------------------------------------
  # Gate — verify source files match the tag version
  # -------------------------------------------------------------------
  version-check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract version from tag
        id: extract
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: python scripts/bump-version.py --check "${{ steps.extract.outputs.version }}"

  # -------------------------------------------------------------------
  # Build — sdist + wheel
  # -------------------------------------------------------------------
  build-wheel:
    needs: [version-check]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: List built artifacts
        run: ls -l dist/
        if: always()

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          retention-days: 7

  # -------------------------------------------------------------------
  # Publish to PyPI (trusted publisher / OIDC)
  # -------------------------------------------------------------------
  publish-pypi:
    needs: [build-wheel]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  # -------------------------------------------------------------------
  # GitHub Release
  # -------------------------------------------------------------------
  release:
    needs: [build-wheel, version-check]
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Create or update release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          body: |
            ## Install

            ```bash
            # From PyPI (recommended)
            pipx install reacher2p

            # Or with pip
            pip install reacher2p==${{ needs.version-check.outputs.version }}
            ```

            ## Raspberry Pi / Headless

            ```bash
            curl -fsSL https://raw.githubusercontent.com/otis-lab-musc/reacher/main/scripts/install.sh | bash
            ```

            ## Upgrade

            ```bash
            pipx upgrade reacher2p
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
