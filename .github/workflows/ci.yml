name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  # Required gate — lint must pass to merge into main.
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install (dev extra)
        run: python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

  # Advisory — runs the suite for visibility. Not yet a required check:
  # two command-registry tests in tests/test_commands.py need triage
  # (whether PAV_COUNTERBALANCE/212 belongs in the pavlovian set), and the
  # tree is not yet `ruff format`-clean. Promote to required once green.
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install (dev extra)
        run: python -m pip install -e ".[dev]"

      - name: Tests
        run: pytest
